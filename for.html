<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
	<script type="text/javascript">
		document.write("<center>");
		var row=parseInt(prompt("请输入打印的行数：",""))
		for(var i=0;i<row;i++)
		{
			for(var j=0;j<=i;j++)
			{
				document.write("*")
			}
			document.write("</br>");
		}
		document.write("</center>");
		</script>
	</body>
</html>
