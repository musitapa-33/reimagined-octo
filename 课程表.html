<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>课程表 - 穆斯塔怕的个人网站</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 课程表专用样式 */
        .schedule-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .schedule-title {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 600;
        }
        
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background: white;
        }
        
        .schedule-table th, .schedule-table td {
            padding: 15px;
            text-align: center;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .schedule-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 1.1em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
        
        .schedule-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        
        .schedule-table tr:hover td {
            background-color: #e8f0fe;
            transform: scale(1.03);
        }
        
        .schedule-table td:first-child {
            font-weight: 600;
            background-color: #f8f9fa;
            border-right: 2px solid #667eea;
        }
        
        .schedule-table .lunch {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-weight: 600;
            font-style: italic;
        }
        
        .schedule-table .weekend {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-weight: 600;
        }
        
        /* 课程类别样式 */
        .math {
            background-color: #ffeaa7;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .chinese {
            background-color: #a29bfe;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .english {
            background-color: #74b9ff;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .pe {
            background-color: #00b894;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .politics {
            background-color: #fd79a8;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .programming {
            background-color: #fdcb6e;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .web {
            background-color: #e17055;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .schedule-container {
                overflow-x: auto;
                padding: 10px;
            }
            
            .schedule-table {
                min-width: 600px;
            }
            
            .schedule-table th, .schedule-table td {
                padding: 10px 5px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
