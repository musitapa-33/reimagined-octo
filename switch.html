<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/javascript">
        var weekday= Number(prompt("请输入星期","星期一"))
        switch(weekday)
        {
            case "星期一":
                document.write("新的一周开始了")
                break;
            case "星期五":
                document.write("明天就可以休息了")
                break;
            default:
                document.write("还要努力学习")
                break;
        }
    </script>
</body>
</html>
