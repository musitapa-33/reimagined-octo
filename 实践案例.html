<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document</title>
	</head>
	<body>
		<script type="text/javascript">
			var hour = prompt("请输入当前的小时数：", "")
			if (hour > 6 && hour < 13) {
				document.write("<h2>上午好，欢迎来到我的网页</h2>")
			} else if (hour > 12 && hour < 21) {
				document.write("<h2>下午好，欢迎来到我的网页</h2>")
			} else {
				document.write("<h2>夜深了,该休息了</h2>")
			}
		</script>
	</body>
</html>
