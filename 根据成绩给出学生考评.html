<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<script type="text/javascript">
		document.write("<h1>成绩评定</h1>");
		var score=Number(prompt("请输入你的成绩：",""))
		var leval;
		if(isNaN(score))
		{
			alert("你输入的不是数字")
		}else{
			if(score<0||score>100){
			alert("你输入的成绩不在有效范围")
			}else{
			switch(parseInt(score/10)){
				case 10:
				case 9:
					leval="优秀"
					break;
				case 8:
					leval="良好"
					break;
				case 7:
					leval="中等"
					break;
				case 6:
					leval="及格"
					break;
				default:
					leval="不及格"  
					break;
			}
		}
		document.write("<h2>你的成绩评定为："+leval+"</h2>");
	}
		</script>
	</body>
</html>
